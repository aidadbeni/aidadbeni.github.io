<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aida Davoudian Beni</title>
  <style>
    :root {
      --cream: #fffaf3;
      --pink: #ffe4ec;
      --rose: #fb7185;
      --lavender: #ede9fe;
      --purple: #7c3aed;
      --violet-soft: #c4b5fd;
      --sky-soft: #bae6fd;
      --mint-soft: #bbf7d0;
      --ink: #2f2933;
      --soft-ink: #6b5f6d;
      --card: rgba(255, 255, 255, 0.78);
      --shadow: rgba(124, 58, 237, 0.16);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #ffe4ec 0 18%, transparent 35%),
        radial-gradient(circle at bottom right, #ddd6fe 0 18%, transparent 36%),
        linear-gradient(135deg, var(--cream), #fff1f7 50%, #f5f3ff);
      overflow-x: hidden;
    }

    #network-background,
    #dna-background {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #network-background {
      z-index: -4;
      opacity: 0.90;
    }

    #dna-background {
      z-index: -3;
      opacity: 0.72;
    }

    .soft-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 228, 236, 0.62), transparent 32%),
        radial-gradient(circle at 80% 75%, rgba(237, 233, 254, 0.70), transparent 34%),
        radial-gradient(circle at 50% 50%, rgba(255, 250, 243, 0.34), transparent 48%);
    }

    .blob {
      position: fixed;
      width: 220px;
      height: 220px;
      border-radius: 45% 55% 60% 40%;
      background: rgba(251, 113, 133, 0.18);
      filter: blur(2px);
      z-index: -1;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    .blob.one {
      top: 8%;
      left: 8%;
    }

    .blob.two {
      right: 9%;
      bottom: 10%;
      background: rgba(124, 58, 237, 0.15);
      animation-delay: 1.5s;
    }

    .blob.three {
      width: 170px;
      height: 170px;
      left: 18%;
      bottom: 12%;
      background: rgba(186, 230, 253, 0.22);
      animation-delay: 2.4s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-18px) rotate(8deg);
      }
    }

    main {
      width: min(780px, 100%);
      text-align: center;
      padding: 56px 34px;
      border-radius: 34px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 28px 70px var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: "✦";
      position: absolute;
      top: 24px;
      left: 30px;
      font-size: 1.8rem;
      color: var(--rose);
      animation: twinkle 2.8s ease-in-out infinite;
    }

    main::after {
      content: "♡";
      position: absolute;
      right: 30px;
      bottom: 24px;
      font-size: 2rem;
      color: var(--purple);
      animation: heartBeat 3.2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.55;
        transform: scale(1) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.16) rotate(12deg);
      }
    }

    @keyframes heartBeat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.12);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(251, 146, 60, 0.14);
      border: 1px solid rgba(255, 237, 213, 0.9);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 620px;
      font-size: clamp(1.05rem, 2.5vw, 1.28rem);
      line-height: 1.75;
      color: var(--soft-ink);
    }

    .highlight {
      color: var(--purple);
      font-weight: 800;
    }

    .construction {
      margin: 32px auto 0;
      width: fit-content;
      padding: 14px 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      color: #5b21b6;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(124, 58, 237, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.78);
    }

    .tiny-row {
      margin-top: 28px;
      font-size: 1.55rem;
      letter-spacing: 0.35rem;
      opacity: 0.85;
    }

    footer {
      margin-top: 24px;
      color: #8b7c90;
      font-size: 0.92rem;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
      color: rgba(124, 58, 237, 0.38);
    }

    .sparkle.s1 {
      top: 21%;
      right: 18%;
      animation: driftTiny 5s ease-in-out infinite;
    }

    .sparkle.s2 {
      bottom: 27%;
      left: 16%;
      animation: driftTiny 6s ease-in-out infinite reverse;
      color: rgba(251, 113, 133, 0.4);
    }

    @keyframes driftTiny {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 0.45;
      }
      50% {
        transform: translate(8px, -10px) rotate(18deg);
        opacity: 0.95;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      main {
        padding: 44px 24px;
        border-radius: 28px;
      }

      main::before,
      main::after {
        display: none;
      }

      .tiny-row {
        letter-spacing: 0.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .blob,
      main::before,
      main::after,
      .sparkle {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="network-background" aria-hidden="true"></canvas>
  <canvas id="dna-background" aria-hidden="true"></canvas>
  <div class="soft-overlay" aria-hidden="true"></div>

  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>

  <main>
    <span class="sparkle s1">✧</span>
    <span class="sparkle s2">✦</span>

    <div class="badge">🌷 Welcome to my little corner of the web</div>

    <h1>Aida Davoudian Beni</h1>

    <p class="subtitle">
      This is the website of <span class="highlight">Aida Davoudian Beni</span>,
      Master's Student in <span class="highlight">Quantitative and Computational Biosciences</span>
      at the <span class="highlight">University of Padova</span>.
    </p>

    <div class="construction">Website under construction rn 🧬✨</div>

    <div class="tiny-row" aria-hidden="true">🌸 🧫 💻 ✨ 🌿</div>

    <footer>
      More updates coming soon.
    </footer>
  </main>

  <script>
    const networkCanvas = document.getElementById("network-background");
    const networkCtx = networkCanvas.getContext("2d");

    const dnaCanvas = document.getElementById("dna-background");
    const dnaCtx = dnaCanvas.getContext("2d");

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    let width;
    let height;
    let pixelRatio;
    let nodes = [];
    let helices = [];
    let animationFrame;

    const nodePalette = [
      "rgba(251, 113, 133, 0.70)",
      "rgba(124, 58, 237, 0.62)",
      "rgba(14, 165, 233, 0.52)",
      "rgba(34, 197, 94, 0.42)"
    ];

    const helixPalette = [
      { line: "rgba(124, 58, 237, 0.30)", rung: "rgba(251, 113, 133, 0.26)", dotA: "rgba(124, 58, 237, 0.55)", dotB: "rgba(251, 113, 133, 0.52)" },
      { line: "rgba(14, 165, 233, 0.24)", rung: "rgba(196, 181, 253, 0.24)", dotA: "rgba(14, 165, 233, 0.45)", dotB: "rgba(124, 58, 237, 0.42)" },
      { line: "rgba(34, 197, 94, 0.20)", rung: "rgba(186, 230, 253, 0.22)", dotA: "rgba(34, 197, 94, 0.35)", dotB: "rgba(251, 113, 133, 0.35)" }
    ];

    function sizeCanvas(canvas, ctx) {
      canvas.width = width * pixelRatio;
      canvas.height = height * pixelRatio;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
    }

    function resizeCanvas() {
      pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;

      sizeCanvas(networkCanvas, networkCtx);
      sizeCanvas(dnaCanvas, dnaCtx);

      createNodes();
      createHelices();
    }

    function createNodes() {
      const area = width * height;
      const count = Math.max(36, Math.min(78, Math.floor(area / 15000)));

      nodes = Array.from({ length: count }, (_, index) => {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.16 + Math.random() * 0.28;

        return {
          x: Math.random() * width,
          y: Math.random() * height,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          radius: 2.2 + Math.random() * 3.6,
          color: nodePalette[index % nodePalette.length],
          pulse: Math.random() * Math.PI * 2
        };
      });
    }

    function createHelices() {
      helices = [
        {
          x: width * 0.16,
          y: height * 0.12,
          height: Math.min(360, height * 0.50),
          amplitude: Math.min(36, width * 0.035),
          spacing: 18,
          phase: 0.4,
          speed: 1.05,
          drift: 0.12,
          rotateAmount: 0.14,
          colorSet: helixPalette[0]
        },
        {
          x: width * 0.84,
          y: height * 0.22,
          height: Math.min(420, height * 0.56),
          amplitude: Math.min(40, width * 0.038),
          spacing: 19,
          phase: 2.0,
          speed: 0.90,
          drift: 0.10,
          rotateAmount: -0.16,
          colorSet: helixPalette[1]
        },
        {
          x: width * 0.52,
          y: height * 0.60,
          height: Math.min(260, height * 0.34),
          amplitude: Math.min(28, width * 0.028),
          spacing: 16,
          phase: 1.15,
          speed: 1.18,
          drift: 0.09,
          rotateAmount: 0.11,
          colorSet: helixPalette[2]
        }
      ];
    }

    function updateNodes() {
      nodes.forEach((node) => {
        node.x += node.vx;
        node.y += node.vy;
        node.pulse += 0.018;

        if (node.x < -20) node.x = width + 20;
        if (node.x > width + 20) node.x = -20;
        if (node.y < -20) node.y = height + 20;
        if (node.y > height + 20) node.y = -20;
      });
    }

    function drawNetworkBackgroundGlow() {
      const gradient = networkCtx.createRadialGradient(
        width * 0.5,
        height * 0.45,
        0,
        width * 0.5,
        height * 0.45,
        Math.max(width, height) * 0.75
      );

      gradient.addColorStop(0, "rgba(255, 255, 255, 0.18)");
      gradient.addColorStop(0.48, "rgba(255, 228, 236, 0.08)");
      gradient.addColorStop(1, "rgba(237, 233, 254, 0.05)");

      networkCtx.fillStyle = gradient;
      networkCtx.fillRect(0, 0, width, height);
    }

    function drawEdges() {
      const maxDistance = Math.min(155, Math.max(105, width * 0.13));

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i];
          const b = nodes[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < maxDistance) {
            const opacity = (1 - distance / maxDistance) * 0.24;

            networkCtx.beginPath();
            networkCtx.moveTo(a.x, a.y);
            networkCtx.lineTo(b.x, b.y);
            networkCtx.strokeStyle = `rgba(124, 58, 237, ${opacity})`;
            networkCtx.lineWidth = 1;
            networkCtx.stroke();
          }
        }
      }
    }

    function drawNodes() {
      nodes.forEach((node) => {
        const pulseSize = Math.sin(node.pulse) * 0.7;
        const radius = node.radius + pulseSize;

        const glow = networkCtx.createRadialGradient(
          node.x,
          node.y,
          0,
          node.x,
          node.y,
          radius * 5
        );

        glow.addColorStop(0, node.color);
        glow.addColorStop(1, "rgba(255, 255, 255, 0)");

        networkCtx.beginPath();
        networkCtx.fillStyle = glow;
        networkCtx.arc(node.x, node.y, radius * 5, 0, Math.PI * 2);
        networkCtx.fill();

        networkCtx.beginPath();
        networkCtx.fillStyle = node.color;
        networkCtx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        networkCtx.fill();

        networkCtx.beginPath();
        networkCtx.fillStyle = "rgba(255, 255, 255, 0.78)";
        networkCtx.arc(node.x - radius * 0.25, node.y - radius * 0.25, radius * 0.33, 0, Math.PI * 2);
        networkCtx.fill();
      });
    }

    function drawHelix(helix, time) {
      const steps = Math.floor(helix.height / helix.spacing);
      const centerY = helix.y + Math.sin(time * helix.drift + helix.phase) * 14;
      const rotation = Math.sin(time * 0.32 + helix.phase) * helix.rotateAmount;

      dnaCtx.save();
      dnaCtx.translate(helix.x, centerY + helix.height / 2);
      dnaCtx.rotate(rotation);
      dnaCtx.translate(-helix.x, -(centerY + helix.height / 2));

      let leftPrev = null;
      let rightPrev = null;

      dnaCtx.lineWidth = 2.2;
      dnaCtx.lineCap = "round";
      dnaCtx.lineJoin = "round";

      for (let i = 0; i <= steps; i++) {
        const y = centerY + i * helix.spacing;
        const t = i * 0.62 + time * helix.speed + helix.phase;
        const wave = Math.sin(t);
        const depth = (wave + 1) / 2;
        const leftX = helix.x - wave * helix.amplitude;
        const rightX = helix.x + wave * helix.amplitude;

        if (leftPrev) {
          dnaCtx.beginPath();
          dnaCtx.moveTo(leftPrev.x, leftPrev.y);
          dnaCtx.lineTo(leftX, y);
          dnaCtx.strokeStyle = helix.colorSet.line;
          dnaCtx.stroke();

          dnaCtx.beginPath();
          dnaCtx.moveTo(rightPrev.x, rightPrev.y);
          dnaCtx.lineTo(rightX, y);
          dnaCtx.strokeStyle = helix.colorSet.line;
          dnaCtx.stroke();
        }

        const rungAlpha = 0.10 + depth * 0.25;
        dnaCtx.beginPath();
        dnaCtx.moveTo(leftX, y);
        dnaCtx.lineTo(rightX, y);
        dnaCtx.strokeStyle = helix.colorSet.rung.replace(/[\d.]+\)$/g, `${rungAlpha})`);
        dnaCtx.lineWidth = 1.4 + depth * 1.3;
        dnaCtx.stroke();

        const frontRadius = 3.2 + depth * 2.2;
        const backRadius = 2.0 + (1 - depth) * 1.4;

        // Soft glow around the pair
        const pairGlow = dnaCtx.createRadialGradient(helix.x, y, 0, helix.x, y, helix.amplitude * 1.35);
        pairGlow.addColorStop(0, "rgba(255,255,255,0.12)");
        pairGlow.addColorStop(1, "rgba(255,255,255,0)");
        dnaCtx.beginPath();
        dnaCtx.fillStyle = pairGlow;
        dnaCtx.arc(helix.x, y, helix.amplitude * 1.2, 0, Math.PI * 2);
        dnaCtx.fill();

        // Left bead
        dnaCtx.beginPath();
        dnaCtx.fillStyle = wave > 0 ? helix.colorSet.dotA : helix.colorSet.dotB;
        dnaCtx.arc(leftX, y, wave > 0 ? frontRadius : backRadius, 0, Math.PI * 2);
        dnaCtx.fill();

        // Right bead
        dnaCtx.beginPath();
        dnaCtx.fillStyle = wave > 0 ? helix.colorSet.dotB : helix.colorSet.dotA;
        dnaCtx.arc(rightX, y, wave > 0 ? backRadius : frontRadius, 0, Math.PI * 2);
        dnaCtx.fill();

        // Tiny highlight
        dnaCtx.beginPath();
        dnaCtx.fillStyle = "rgba(255,255,255,0.65)";
        dnaCtx.arc(leftX - 0.8, y - 0.8, Math.max(0.8, (wave > 0 ? frontRadius : backRadius) * 0.28), 0, Math.PI * 2);
        dnaCtx.fill();

        dnaCtx.beginPath();
        dnaCtx.fillStyle = "rgba(255,255,255,0.65)";
        dnaCtx.arc(rightX - 0.8, y - 0.8, Math.max(0.8, (wave > 0 ? backRadius : frontRadius) * 0.28), 0, Math.PI * 2);
        dnaCtx.fill();

        leftPrev = { x: leftX, y };
        rightPrev = { x: rightX, y };
      }

      dnaCtx.restore();
    }

    function drawDNA(time) {
      dnaCtx.clearRect(0, 0, width, height);

      const haze = dnaCtx.createRadialGradient(
        width * 0.55,
        height * 0.48,
        0,
        width * 0.55,
        height * 0.48,
        Math.max(width, height) * 0.7
      );
      haze.addColorStop(0, "rgba(255, 255, 255, 0.10)");
      haze.addColorStop(0.50, "rgba(237, 233, 254, 0.08)");
      haze.addColorStop(1, "rgba(255, 255, 255, 0)");
      dnaCtx.fillStyle = haze;
      dnaCtx.fillRect(0, 0, width, height);

      helices.forEach((helix) => drawHelix(helix, time));
    }

    function renderFrame(timestamp = 0) {
      const time = timestamp * 0.001;

      networkCtx.clearRect(0, 0, width, height);
      drawNetworkBackgroundGlow();
      drawEdges();
      drawNodes();
      drawDNA(time);

      if (!prefersReducedMotion) {
        updateNodes();
        animationFrame = requestAnimationFrame(renderFrame);
      }
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    renderFrame();

    if (prefersReducedMotion && animationFrame) {
      cancelAnimationFrame(animationFrame);
    }
  </script>
</body>
</html>
